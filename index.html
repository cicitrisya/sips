    const defaultSmpSchools = [
      {

    ];

    const defaultVisits = [
      { id: "v-0", namaSekolah: "TK Pembina Negeri Palembang", jenjang: "TK", status: "NEGERI", checklist: [true, true, true, false, false, false, false, false, false, false, false, false] },
      { id: "v-1", namaSekolah: "SD Negeri 1 Palembang", jenjang: "SD", status: "NEGERI", checklist: [true, true, false, false, true, false, false, false, true, false, true, false] },
      { id: "v-2", namaSekolah: "SD Swasta IT Al-Azhar", jenjang: "SD", status: "SWASTA", checklist: [true, false, true, false, true, false, true, false, true, false, true, false] },
      { id: "v-3", namaSekolah: "SMP Negeri 1 Palembang", jenjang: "SMP", status: "NEGERI", checklist: [true, true, true, true, false, true, false, false, true, true, false, true] }
    ];

    const defaultPkks = [
      { id: "p-0", sekolah: "TK Pembina Negeri Palembang", indikator: "Sangat Aktif", observasi: "A", keterangan: "Sangat inovatif dalam menyusun media pembelajaran ramah anak." },
      { id: "p-1", sekolah: "SD Negeri 1 Palembang", indikator: "Aktif", observasi: "A", keterangan: "Sangat baik dalam manajemen pengelolaan administrasi sekolah." },
      { id: "p-2", sekolah: "SMP Negeri 1 Palembang", indikator: "Aktif", observasi: "A", keterangan: "Implementasi Kurikulum Merdeka terlaksana secara menyeluruh." }
    ];

    const defaultReflections = [
      { id: "r-0", namaSekolah: "TK Pembina Negeri Palembang", pertemuan: 1, tanggal: "2026-02-10", deskripsi: "Evaluasi penerapan pembelajaran proyek berbasis alam di luar kelas.", status: "Selesai" },
      { id: "r-1", namaSekolah: "SD Negeri 1 Palembang", pertemuan: 1, tanggal: "2026-01-15", deskripsi: "Refleksi awal peningkatan literasi dasar pada murid kelas rendah.", status: "Aktif" },
      { id: "r-2", namaSekolah: "SMP Negeri 1 Palembang", pertemuan: 2, tanggal: "2026-03-22", deskripsi: "Evaluasi kesiapan sarana Asesmen Nasional Berbasis Komputer (ANBK).", status: "Aktif" }
    ];

    function App() {
      // Pilihan Menu Utama
      const [currentTab, setCurrentTab] = useState("dashboard");
      // Pilihan Sub-Tab Data TK, SD & Data SMP (sekolah, murid, rombel, guru)
      const [tkTab, setTkTab] = useState("sekolah");
      const [sdTab, setSdTab] = useState("sekolah");
      const [smpTab, setSmpTab] = useState("sekolah");

      // Load data awal dari Local Storage atau gunakan template bawaan
      const [tkSchools, setTkSchools] = useState(() => {
        const stored = localStorage.getItem("sips_tk_schools");
        return stored ? JSON.parse(stored) : defaultTkSchools;
      });

      const [sdSchools, setSdSchools] = useState(() => {
        const stored = localStorage.getItem("sips_sd_schools");
        return stored ? JSON.parse(stored) : defaultSdSchools;
      });

      const [smpSchools, setSmpSchools] = useState(() => {
        const stored = localStorage.getItem("sips_smp_schools");
        return stored ? JSON.parse(stored) : defaultSmpSchools;
      });

      const [visits, setVisits] = useState(() => {
        const stored = localStorage.getItem("sips_visits");
        return stored ? JSON.parse(stored) : defaultVisits;
      });

      const [pkks, setPkks] = useState(() => {
        const stored = localStorage.getItem("sips_pkks");
        return stored ? JSON.parse(stored) : defaultPkks;
      });

      const [reflections, setReflections] = useState(() => {
        const stored = localStorage.getItem("sips_reflections");
        return stored ? JSON.parse(stored) : defaultReflections;
      });

      // --- STATE UNTUK IMPORT EXCEL ---
      const [uploadJenjang, setUploadJenjang] = useState("TK");
      const [uploadType, setUploadType] = useState("sekolah");
      const [previewRows, setPreviewRows] = useState([]);
      const [excelFileName, setExcelFileName] = useState("");
      const [uploadError, setUploadError] = useState("");

      // Sinkronisasi data ke Local Storage setiap kali terjadi perubahan
      useEffect(() => {
        localStorage.setItem("sips_tk_schools", JSON.stringify(tkSchools));
      }, [tkSchools]);

      useEffect(() => {
        localStorage.setItem("sips_sd_schools", JSON.stringify(sdSchools));
      }, [sdSchools]);

      useEffect(() => {
        localStorage.setItem("sips_smp_schools", JSON.stringify(smpSchools));
      }, [smpSchools]);

      useEffect(() => {
        localStorage.setItem("sips_visits", JSON.stringify(visits));
      }, [visits]);

      useEffect(() => {
        localStorage.setItem("sips_pkks", JSON.stringify(pkks));
      }, [pkks]);

      useEffect(() => {
        localStorage.setItem("sips_reflections", JSON.stringify(reflections));
      }, [reflections]);

      // State Pencarian global / Filter Sekolah
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedSchoolFilter, setSelectedSchoolFilter] = useState("");

      // State Pengaturan Modal Form
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState(""); // "tk_sekolah", "sd_sekolah", "smp_sekolah", "pkks", "refleksi"
      const [editData, setEditData] = useState(null);
      const [formData, setFormData] = useState({});

      // State Konfirmasi Hapus Kustom (Menggantikan confirm)
      const [confirmDelete, setConfirmDelete] = useState({ isOpen: false, type: "", id: "", title: "" });

      // State Notifikasi Kustom (Menggantikan alert)
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // Reset pencarian dan filter
      const handleResetSearch = () => {
        setSearchQuery("");
        setSelectedSchoolFilter("");
      };

      // --- FUNGSI DOWNLOAD TEMPLATE EXCEL ---
      const handleDownloadTemplate = () => {
        let headers = [];
        let sampleRow = {};

        if (uploadType === "sekolah") {
          headers = ["NPSN", "Nama Sekolah", "Status (NEGERI/SWASTA)", "Alamat", "Akreditasi (A/B/C/Belum Akreditasi)", "Kepala Sekolah", "No HP Kepsek", "Email"];
          sampleRow = {
            "NPSN": uploadJenjang === "TK" ? "20108899" : (uploadJenjang === "SD" ? "10234567" : "30104561"),
            "Nama Sekolah": `${uploadJenjang} Binaan Baru Contoh`,
            "Status (NEGERI/SWASTA)": "NEGERI",
            "Alamat": "Jl. Merdeka Raya No. 12",
            "Akreditasi (A/B/C/Belum Akreditasi)": "A",
            "Kepala Sekolah": "Dr. Budiman, M.Pd.",
            "No HP Kepsek": "08123456789",
            "Email": "sekolah_contoh@sch.id"
          };
        } else if (uploadType === "murid") {
          if (uploadJenjang === "TK") {
            headers = ["NPSN", "Nama Sekolah", "Laki-laki Kelompok A", "Perempuan Kelompok A", "Laki-laki Kelompok B", "Perempuan Kelompok B"];
            sampleRow = { "NPSN": "20108899", "Nama Sekolah": "TK Pembina Negeri Palembang", "Laki-laki Kelompok A": 18, "Perempuan Kelompok A": 20, "Laki-laki Kelompok B": 22, "Perempuan Kelompok B": 24 };
          } else if (uploadJenjang === "SD") {
            headers = ["NPSN", "Nama Sekolah", "L1", "P1", "L2", "P2", "L3", "P3", "L4", "P4", "L5", "P5", "L6", "P6"];
            sampleRow = { "NPSN": "10234567", "Nama Sekolah": "SD Negeri 1 Palembang", "L1": 25, "P1": 22, "L2": 24, "P2": 26, "L3": 21, "P3": 25, "L4": 28, "P4": 20, "L5": 22, "P5": 23, "L6": 29, "P6": 21 };
          } else if (uploadJenjang === "SMP") {
            headers = ["NPSN", "Nama Sekolah", "L7", "P7", "L8", "P8", "L9", "P9"];
            sampleRow = { "NPSN": "30104561", "Nama Sekolah": "SMP Negeri 1 Palembang", "L7": 95, "P7": 102, "L8": 98, "P8": 96, "L9": 105, "P9": 99 };
          }
        } else if (uploadType === "rombel") {
          if (uploadJenjang === "TK") {
            headers = ["NPSN", "Nama Sekolah", "Rombel Kelompok A", "Rombel Kelompok B"];
            sampleRow = { "NPSN": "20108899", "Nama Sekolah": "TK Pembina Negeri Palembang", "Rombel Kelompok A": 1, "Rombel Kelompok B": 2 };
          } else if (uploadJenjang === "SD") {
            headers = ["NPSN", "Nama Sekolah", "Rombel Kelas 1", "Rombel Kelas 2", "Rombel Kelas 3", "Rombel Kelas 4", "Rombel Kelas 5", "Rombel Kelas 6"];
            sampleRow = { "NPSN": "10234567", "Nama Sekolah": "SD Negeri 1 Palembang", "Rombel Kelas 1": 1, "Rombel Kelas 2": 1, "Rombel Kelas 3": 1, "Rombel Kelas 4": 1, "Rombel Kelas 5": 1, "Rombel Kelas 6": 1 };
          } else if (uploadJenjang === "SMP") {
            headers = ["NPSN", "Nama Sekolah", "Rombel Kelas 7", "Rombel Kelas 8", "Rombel Kelas 9"];
            sampleRow = { "NPSN": "30104561", "Nama Sekolah": "SMP Negeri 1 Palembang", "Rombel Kelas 7": 3, "Rombel Kelas 8": 3, "Rombel Kelas 9": 3 };
          }
        } else if (uploadType === "guru") {
          headers = ["NPSN", "Nama Sekolah", "Guru PNS atau P3K", "Guru Non ASN", "Guru Yayasan", "Tendik", "Kepala Sekolah"];
          sampleRow = { "NPSN": uploadJenjang === "TK" ? "20108899" : (uploadJenjang === "SD" ? "10234567" : "30104561"), "Nama Sekolah": "Nama Sekolah Binaan", "Guru PNS atau P3K": 4, "Guru Non ASN": 2, "Guru Yayasan": 0, "Tendik": 1, "Kepala Sekolah": 1 };
        }

        const ws = XLSX.utils.json_to_sheet([sampleRow], { header: headers });
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Template Upload");
        XLSX.writeFile(wb, `Template_SIPS_${uploadJenjang}_${uploadType}.xlsx`);
        showNotification("Template Excel berhasil diunduh!", "success");
      };

      // --- FUNGSI MEMPROSES FILE EXCEL ---
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setExcelFileName(file.name);
        setUploadError("");
        setPreviewRows([]);

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            if (jsonData.length === 0) {
              setUploadError("File excel kosong atau tidak memiliki baris data.");
              return;
            }

            // Melakukan pemetaan dan validasi baris ke struktur tabel pratinjau
            const parsedData = jsonData.map((row, idx) => {
              const rowNpsn = String(row["NPSN"] || "").trim();
              const rowNama = String(row["Nama Sekolah"] || "").trim();

              // Deteksi kecocokan sekolah berdasarkan NPSN di database lokal saat ini
              let dbSchools = uploadJenjang === "TK" ? tkSchools : (uploadJenjang === "SD" ? sdSchools : smpSchools);
              let matchingSchool = dbSchools.find(s => s.npsn === rowNpsn);
              
              let statusStr = "BARU";
              let msg = "Akan ditambahkan sebagai sekolah baru.";

              if (uploadType !== "sekolah") {
                if (!matchingSchool) {
                  statusStr = "SALAH";
                  msg = `Peringatan: NPSN "${rowNpsn}" tidak ditemukan di database. Silakan upload profil sekolah dahulu.`;
                } else {
                  statusStr = "UPDATE";
                  msg = `Ditemukan: Akan memperbaharui data sekolah "${matchingSchool.nama}".`;
                }
              } else {
                if (matchingSchool) {
                  statusStr = "UPDATE";
                  msg = `Ditemukan: Akan menimpa/memperbaharui profil sekolah "${matchingSchool.nama}".`;
                }
              }

              return {
                id: idx,
                npsn: rowNpsn,
                nama: rowNama || (matchingSchool ? matchingSchool.nama : "Tidak Diketahui"),
                status: statusStr,
                pesan: msg,
                rawData: row
              };
            });

            setPreviewRows(parsedData);
          } catch (err) {
            console.error(err);
            setUploadError("Gagal membaca file Excel. Pastikan format file Anda benar.");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // --- FUNGSI MENYIMPAN HASIL UPLOAD KE DATABASE ---
      const handleSaveUpload = () => {
        if (previewRows.length === 0) {
          showNotification("Tidak ada data untuk disimpan.", "error");
          return;
        }

        let updatedSchools = [...(uploadJenjang === "TK" ? tkSchools : (uploadJenjang === "SD" ? sdSchools : smpSchools))];
        let importCount = 0;
        let updateCount = 0;

        previewRows.forEach(({ npsn, nama, status, rawData }) => {
          if (status === "SALAH") return; // Abaikan data siswa/rombel/guru dari sekolah tak terdaftar

          let existingIndex = updatedSchools.findIndex(s => s.npsn === npsn);

          if (uploadType === "sekolah") {
            const newSchoolObj = {
              id: existingIndex >= 0 ? updatedSchools[existingIndex].id : `${uploadJenjang.toLowerCase()}-${Date.now()}-${npsn}`,
              npsn: npsn,
              nama: rawData["Nama Sekolah"] || nama,
              status: String(rawData["Status (NEGERI/SWASTA)"] || "NEGERI").toUpperCase(),
              alamat: rawData["Alamat"] || "",
              akreditasi: rawData["Akreditasi (A/B/C/Belum Akreditasi)"] || "A",
              kepsek: rawData["Kepala Sekolah"] || "",
              hpKepsek: String(rawData["No HP Kepsek"] || ""),
              email: rawData["Email"] || "",
              murid: existingIndex >= 0 ? updatedSchools[existingIndex].murid : (uploadJenjang === "TK" ? { LA: 0, PA: 0, LB: 0, PB: 0 } : (uploadJenjang === "SD" ? { L1: 0, P1: 0, L2: 0, P2: 0, L3: 0, P3: 0, L4: 0, P4: 0, L5: 0, P5: 0, L6: 0, P6: 0 } : { L7: 0, P7: 0, L8: 0, P8: 0, L9: 0, P9: 0 })),
              rombel: existingIndex >= 0 ? updatedSchools[existingIndex].rombel : (uploadJenjang === "TK" ? [0, 0] : (uploadJenjang === "SD" ? [0, 0, 0, 0, 0, 0] : [0, 0, 0])),
              guru: existingIndex >= 0 ? updatedSchools[existingIndex].guru : { pns: 0, nonAsn: 0, yayasan: 0, tendik: 0, kepsek: 1 }
            };

            if (existingIndex >= 0) {
              updatedSchools[existingIndex] = newSchoolObj;
              updateCount++;
            } else {
              updatedSchools.push(newSchoolObj);
              importCount++;
              // Otomatis masukkan ke agenda kunjungan bulanan jika baru
              visits.push({ id: "v-" + Date.now() + "-" + npsn, namaSekolah: newSchoolObj.nama, jenjang: uploadJenjang, status: newSchoolObj.status, checklist: Array(12).fill(false) });
            }
          } else if (uploadType === "murid" && existingIndex >= 0) {
            let school = updatedSchools[existingIndex];
            if (uploadJenjang === "TK") {
              school.murid = {
                LA: parseInt(rawData["Laki-laki Kelompok A"]) || 0,
                PA: parseInt(rawData["Perempuan Kelompok A"]) || 0,
                LB: parseInt(rawData["Laki-laki Kelompok B"]) || 0,
                PB: parseInt(rawData["Perempuan Kelompok B"]) || 0
              };
            } else if (uploadJenjang === "SD") {
              school.murid = {
                L1: parseInt(rawData["L1"]) || 0, P1: parseInt(rawData["P1"]) || 0,
                L2: parseInt(rawData["L2"]) || 0, P2: parseInt(rawData["P2"]) || 0,
                L3: parseInt(rawData["L3"]) || 0, P3: parseInt(rawData["P3"]) || 0,
                L4: parseInt(rawData["L4"]) || 0, P4: parseInt(rawData["P4"]) || 0,
                L5: parseInt(rawData["L5"]) || 0, P5: parseInt(rawData["P5"]) || 0,
                L6: parseInt(rawData["L6"]) || 0, P6: parseInt(rawData["P6"]) || 0
              };
            } else if (uploadJenjang === "SMP") {
              school.murid = {
                L7: parseInt(rawData["L7"]) || 0, P7: parseInt(rawData["P7"]) || 0,
                L8: parseInt(rawData["L8"]) || 0, P8: parseInt(rawData["P8"]) || 0,
                L9: parseInt(rawData["L9"]) || 0, P9: parseInt(rawData["P9"]) || 0
              };
            }
            updateCount++;
          } else if (uploadType === "rombel" && existingIndex >= 0) {
            let school = updatedSchools[existingIndex];
            if (uploadJenjang === "TK") {
              school.rombel = [
                parseInt(rawData["Rombel Kelompok A"]) || 0,
                parseInt(rawData["Rombel Kelompok B"]) || 0
              ];
            } else if (uploadJenjang === "SD") {
              school.rombel = [
                parseInt(rawData["Rombel Kelas 1"]) || 0, parseInt(rawData["Rombel Kelas 2"]) || 0,

                      }`}
                    >
